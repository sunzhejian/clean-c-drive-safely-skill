<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Sample free space lift</title>
  <desc id="desc">A bar chart showing free space increasing from 58 GB before cleanup to 104 GB after cleanup, passing a 100 GB target.</desc>
  <rect width="960" height="420" fill="#f8fafc"/>
  <text x="40" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Sample Free Space Lift</text>
  <text x="40" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">An anonymized example of a cleanup run that migrates caches, removes approved dumps, and validates apps.</text>
  <line x1="108" y1="330" x2="870" y2="330" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="108" y1="110" x2="108" y2="330" stroke="#cbd5e1" stroke-width="2"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#64748b">
    <text x="72" y="334">0</text>
    <text x="64" y="279">30</text>
    <text x="64" y="224">60</text>
    <text x="64" y="169">90</text>
    <text x="55" y="114">120</text>
    <text x="42" y="100">GB free</text>
  </g>
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="108" y1="275" x2="870" y2="275"/>
    <line x1="108" y1="220" x2="870" y2="220"/>
    <line x1="108" y1="165" x2="870" y2="165"/>
    <line x1="108" y1="110" x2="870" y2="110"/>
  </g>
  <line x1="108" y1="146.7" x2="870" y2="146.7" stroke="#ef4444" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="744" y="139" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#b91c1c">100 GB target</text>
  <rect x="210" y="223.7" width="170" height="106.3" rx="8" fill="#2563eb"/>
  <rect x="515" y="139.3" width="170" height="190.7" rx="8" fill="#16a34a"/>
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="295" y="213" font-size="26" font-weight="700" fill="#1e3a8a">58 GB</text>
    <text x="600" y="129" font-size="26" font-weight="700" fill="#166534">104 GB</text>
    <text x="295" y="360" font-size="16" font-weight="600" fill="#334155">Before</text>
    <text x="600" y="360" font-size="16" font-weight="600" fill="#334155">After</text>
  </g>
  <path d="M405 235 C452 205, 457 184, 500 164" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#0f766e"/>
    </marker>
  </defs>
  <text x="425" y="246" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f766e">+46 GB usable headroom</text>
  <rect x="40" y="382" width="880" height="1" fill="#e2e8f0"/>
  <text x="40" y="404" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">Sample data: inspect first, migrate safe app data, delete approved disposable files, then validate.</text>
</svg>
